<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Digital Voting Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="glass-container" style="max-width: 450px;">
        <div class="header-section">
            <div class="icon-wrapper">
                <span class="icon">📝</span>
            </div>
            <h1>Voter Dashboard Login</h1>
            <p>Access your secure voting profile to cast your vote</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="aadhaar">Aadhaar Number</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="aadhaar" placeholder="1234 5678 9012" maxlength="14" autocomplete="off" required>
                    <span class="field-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                            <line x1="7" y1="8" x2="17" y2="8"></line>
                            <line x1="7" y1="12" x2="17" y2="12"></line>
                            <line x1="7" y1="16" x2="13" y2="16"></line>
                        </svg>
                    </span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" placeholder="••••••••••••" required>
                    <span class="field-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <span class="toggle-password" id="togglePasswordBtn">
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>
            
            <div class="button-row">
                <button type="submit" class="btn btn-indigo">
                    Sign In
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                <a href="/menu" class="btn btn-muted">Cancel</a>
            </div>
        </form>
        
        <p style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 14px;">
            New to the system? <a href="/signup" style="color: var(--accent-indigo); text-decoration: none; font-weight: 600; transition: var(--transition-smooth); border-bottom: 1px dashed var(--accent-indigo); padding-bottom: 2px;">Create an account</a>
        </p>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Password visibility toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            if (isPassword) {
                // Change eye to eye-off SVG icon
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                // Change back to regular eye SVG icon
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });

        // Aadhaar auto-formatter (adds space every 4 digits)
        const aadhaarInput = document.getElementById('aadhaar');
        aadhaarInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formatted += ' ';
                }
                formatted += value[i];
            }
            e.target.value = formatted;
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            showLoader('Authenticating details...');
            
            // Strip out spaces for raw 12-digit Aadhaar to the backend
            const rawAadhaar = aadhaarInput.value.replace(/\s+/g, '');
            
            const data = {
                aadhaar: rawAadhaar,
                password: passwordInput.value
            };
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                hideLoader();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showToast(result.message || 'Login failed!', 'error');
                }
            } catch (error) {
                hideLoader();
                showToast('Login error: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
